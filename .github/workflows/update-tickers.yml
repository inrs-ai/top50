name: Monthly Tickers Update

on:
  schedule:
    - cron: '26 21 3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests pandas lxml

      - name: 执行更新脚本
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python update_tickers.py

      - name: 提交变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tickers.json
          git commit --allow-empty -m "chore: auto-update tickers.json ($(date +%Y-%m-%d))"
          git push
